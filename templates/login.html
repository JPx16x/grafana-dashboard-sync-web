<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Grafana Dashboard Sync</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #171b24;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #303645;
      --primary: #f97316;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top left, #1f2937 0, #0f1117 38%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      background: linear-gradient(180deg, var(--card), #121620);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    .logo {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      background: rgba(249, 115, 22, 0.12);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: #0b0e14;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px;
      outline: none;
      margin-bottom: 16px;
    }

    input:focus {
      border-color: var(--primary);
    }

    button {
      width: 100%;
      background: var(--primary);
      color: #111827;
      border: 0;
      border-radius: 10px;
      padding: 13px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 4px;
    }

    button:hover {
      filter: brightness(1.08);
    }

    .error {
      background: rgba(239, 68, 68, 0.12);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.35);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <form class="login-card" method="POST">
    <div class="logo">G</div>

    <h1>Grafana Dashboard Sync</h1>
    <p>Entre para acessar a central de sincronizacao de dashboards entre organizacoes do Grafana.</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <label>Usuario</label>
    <input type="text" name="username" autocomplete="username" required autofocus>

    <label>Senha</label>
    <input type="password" name="password" autocomplete="current-password" required>

    <button type="submit">Entrar</button>

    <div class="footer">
      Acesso restrito a administradores.
    </div>
  </form>

<!-- FBX_LOGO_START -->
<style>
  .fbx-login-logo-wrap {
    width: 150px;
    height: 88px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    background: transparent !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    margin-bottom: 24px;
  }

  .fbx-login-logo-wrap img {
    width: 150px;
    height: auto;
    object-fit: contain;
    display: block;
  }

  @media (max-width: 768px) {
    .fbx-login-logo-wrap {
      width: 120px;
      height: 70px;
    }

    .fbx-login-logo-wrap img {
      width: 120px;
    }
  }
</style>

<script>
(function () {
  const LOGO_URL = "https://storage.googleapis.com/flowbix-img/LogoFBX_noBck.png";

  function textOf(el) {
    return (el && el.textContent || "").trim();
  }

  function applyLoginLogo() {
    if (document.querySelector(".fbx-login-logo-wrap")) return;

    const gCandidates = [...document.querySelectorAll("div,span")]
      .filter(el => textOf(el) === "G" && el.children.length === 0);

    if (!gCandidates.length) return;

    const gBox = gCandidates[0];

    const wrap = document.createElement("div");
    wrap.className = "fbx-login-logo-wrap";
    wrap.innerHTML = '<img src="' + LOGO_URL + '" alt="Flowbix">';

    gBox.replaceWith(wrap);
  }

  document.addEventListener("DOMContentLoaded", applyLoginLogo);
  window.addEventListener("load", applyLoginLogo);

  const observer = new MutationObserver(applyLoginLogo);
  document.addEventListener("DOMContentLoaded", () => {
    observer.observe(document.body, { childList: true, subtree: true });
    setTimeout(applyLoginLogo, 300);
    setTimeout(applyLoginLogo, 1000);
  });
})();
</script>
<!-- FBX_LOGO_END -->

</body>
</html>

<style>
/* Ajuste visual Flowbix - login */
.fbx-login-logo-wrap {
  width: 100% !important;
  height: auto !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  margin: 0 auto 34px auto !important;
}

.fbx-login-logo-wrap img {
  width: 230px !important;
  max-width: 75% !important;
  height: auto !important;
  object-fit: contain !important;
  display: block !important;
}

@media (max-width: 768px) {
  .fbx-login-logo-wrap img {
    width: 190px !important;
  }
}
</style>
